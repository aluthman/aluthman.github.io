<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Match Scorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --a: #1B6FE8;
      --a-light: #E8F0FD;
      --a-mid: #4D8FF0;
      --a-dark: #0D47A1;
      --b: #E04B2A;
      --b-light: #FDF0EC;
      --b-mid: #E87558;
      --b-dark: #A8300F;
      --surface: #F6F7F9;
      --card: #FFFFFF;
      --border: #E4E6EA;
      --text: #111318;
      --text-2: #555B6B;
      --text-3: #9099AB;
      --radius: 14px;
      --radius-sm: 8px;
      --mono: 'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--surface);
      color: var(--text);
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── screens ── */
    .screen { display: none; min-height: 100dvh; flex-direction: column; }
    .screen.active { display: flex; }

    /* ── SETUP SCREEN ── */
    #setup { background: var(--surface); padding: 0; }

    .setup-hero {
      background: var(--text);
      color: #fff;
      padding: 40px 24px 32px;
      text-align: center;
    }
    .setup-hero .eyebrow {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 10px;
      font-family: var(--mono);
    }
    .setup-hero h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }
    .setup-hero p {
      margin-top: 8px;
      font-size: 14px;
      color: rgba(255,255,255,0.55);
    }

    .setup-body { padding: 24px 20px 40px; flex: 1; }

    .team-section { margin-bottom: 20px; }
    .team-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .team-label .dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .team-label.a .dot { background: var(--a); }
    .team-label.b .dot { background: var(--b); }
    .team-label.a { color: var(--a-dark); }
    .team-label.b { color: var(--b-dark); }

    .input-group { background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--border); overflow: hidden; }
    .input-row {
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .input-row:last-child { border-bottom: none; }
    .input-icon {
      width: 48px; min-width: 48px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-3);
      font-size: 13px;
      font-family: var(--mono);
      font-weight: 500;
    }
    .input-row input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      padding: 14px 14px 14px 0;
      background: transparent;
    }
    .input-row input::placeholder { color: var(--text-3); }

    .start-btn {
      display: block;
      width: 100%;
      margin-top: 28px;
      padding: 17px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: opacity 0.15s;
    }
    .start-btn:active { opacity: 0.8; }

    .share-section {
      margin-top: 20px;
      background: var(--card);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      padding: 16px;
    }
    .share-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 10px;
    }
    .share-url {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--a);
      word-break: break-all;
      line-height: 1.5;
      background: var(--a-light);
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
    }
    .copy-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      color: var(--text-2);
      cursor: pointer;
      transition: background 0.12s;
    }
    .copy-btn:active { background: var(--surface); }
    .copy-btn svg { width: 15px; height: 15px; }

    /* ── GAME SCREEN ── */
    #game { background: var(--surface); }

    .game-header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .game-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .match-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
    }
    .scoreboard-pill {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--surface);
      border-radius: 100px;
      border: 1.5px solid var(--border);
      overflow: hidden;
    }
    .score-chip {
      padding: 5px 14px;
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 500;
      line-height: 1;
    }
    .score-chip.a { color: var(--a); }
    .score-chip.b { color: var(--b); }
    .score-sep {
      font-size: 14px;
      color: var(--text-3);
      padding: 0 2px;
    }

    /* round tabs */
    .round-tabs {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 0;
    }
    .round-tabs::-webkit-scrollbar { display: none; }
    .round-tab {
      flex-shrink: 0;
      padding: 10px 14px 11px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-3);
      border: none;
      background: transparent;
      cursor: pointer;
      position: relative;
      font-family: 'Inter', sans-serif;
      transition: color 0.12s;
    }
    .round-tab.active { color: var(--text); }
    .round-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2.5px;
      background: var(--text);
      border-radius: 2px 2px 0 0;
    }
    .round-tab.done::before {
      content: '';
      position: absolute;
      top: 8px; right: 8px;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--a);
    }

    /* round content */
    .round-content { display: none; padding: 16px 16px 100px; flex: 1; }
    .round-content.active { display: block; }

    /* team block */
    .team-block { margin-bottom: 12px; }
    .team-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      padding: 0 2px;
    }
    .team-block-name {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }
    .team-block-name.a { color: var(--a-dark); }
    .team-block-name.b { color: var(--b-dark); }
    .team-block-score {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 500;
    }
    .team-block-score.a { color: var(--a); }
    .team-block-score.b { color: var(--b); }

    /* player card */
    .player-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      padding: 14px 16px;
      margin-bottom: 8px;
      transition: border-color 0.15s;
    }
    .player-card.perfect.a { border-color: var(--a); background: var(--a-light); }
    .player-card.perfect.b { border-color: var(--b); background: var(--b-light); }

    .player-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .player-name-row { display: flex; align-items: center; gap: 8px; }
    .player-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    .player-avatar.a { background: var(--a); color: #fff; }
    .player-avatar.b { background: var(--b); color: #fff; }
    .player-name {
      font-size: 15px;
      font-weight: 500;
    }
    .player-pts {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 500;
      color: var(--text-2);
    }
    .player-pts.a { color: var(--a); }
    .player-pts.b { color: var(--b); }
    .bonus-tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 2px 7px;
      border-radius: 100px;
      text-transform: uppercase;
    }
    .bonus-tag.a { background: var(--a); color: #fff; }
    .bonus-tag.b { background: var(--b); color: #fff; }

    .shot-row {
      display: flex;
      gap: 10px;
    }
    .shot-btn {
      flex: 1;
      height: 52px;
      border-radius: var(--radius-sm);
      border: 2px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-3);
      font-family: 'Inter', sans-serif;
      transition: all 0.1s;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .shot-btn.scored.a {
      background: var(--a);
      border-color: var(--a);
      color: #fff;
    }
    .shot-btn.scored.b {
      background: var(--b);
      border-color: var(--b);
      color: #fff;
    }
    .shot-btn:active { transform: scale(0.95); }

    /* round summary strip */
    .round-summary {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .summary-label { font-size: 12px; color: var(--text-3); }
    .summary-scores {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 500;
    }
    .summary-sep { color: var(--text-3); font-size: 14px; }

    /* next round btn */
    .nav-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      background: rgba(246,247,249,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }
    .nav-btn {
      flex: 1;
      padding: 15px;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      border: none;
      cursor: pointer;
      transition: opacity 0.12s, transform 0.1s;
    }
    .nav-btn:active { opacity: 0.8; transform: scale(0.98); }
    .nav-btn.primary { background: var(--text); color: #fff; }
    .nav-btn.secondary { background: var(--card); color: var(--text-2); border: 1.5px solid var(--border); flex: 0 0 auto; width: 52px; font-size: 20px; }

    /* ── FINAL SCREEN ── */
    #final { background: var(--surface); }

    .final-header {
      padding: 48px 24px 32px;
      text-align: center;
    }
    .winner-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      font-family: var(--mono);
      margin-bottom: 10px;
    }
    .winner-name {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .winner-name.a { color: var(--a); }
    .winner-name.b { color: var(--b); }
    .winner-name.tie { color: var(--text); }
    .final-score {
      font-family: var(--mono);
      font-size: 48px;
      font-weight: 500;
      letter-spacing: 0.02em;
      margin: 20px 0 8px;
    }
    .final-score .fa { color: var(--a); }
    .final-score .fb { color: var(--b); }
    .final-score .sep { color: var(--border); margin: 0 8px; }

    .final-body { padding: 0 16px 120px; }

    .round-recap { margin-bottom: 8px; }
    .round-recap-header {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-3);
      padding: 0 4px;
      margin-bottom: 6px;
    }
    .recap-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      overflow: hidden;
    }
    .recap-row {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .recap-row:last-child { border-bottom: none; }
    .recap-player { flex: 1; font-size: 14px; }
    .recap-shots {
      display: flex;
      gap: 4px;
      margin-right: 10px;
    }
    .recap-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
    }
    .recap-dot.scored.a { background: var(--a); border-color: var(--a); }
    .recap-dot.scored.b { background: var(--b); border-color: var(--b); }
    .recap-pts {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 500;
      min-width: 28px;
      text-align: right;
    }
    .recap-pts.a { color: var(--a); }
    .recap-pts.b { color: var(--b); }

    .play-again-btn {
      display: block;
      width: 100%;
      padding: 17px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<!-- ════ SETUP SCREEN ════ -->
<div class="screen" id="setup">
  <div class="setup-hero">
    <div class="eyebrow">Match Scorer</div>
    <h1>Set up your match</h1>
    <p>Enter player names to get started</p>
  </div>
  <div class="setup-body">
    <div class="team-section">
      <div class="team-label a"><span class="dot"></span>Team A</div>
      <div class="input-group">
        <div class="input-row">
          <div class="input-icon">T</div>
          <input type="text" id="team-a-name" placeholder="Team name" autocomplete="off" spellcheck="false">
        </div>
        <div class="input-row">
          <div class="input-icon">P1</div>
          <input type="text" id="pa1" placeholder="Player 1" autocomplete="off">
        </div>
        <div class="input-row">
          <div class="input-icon">P2</div>
          <input type="text" id="pa2" placeholder="Player 2" autocomplete="off">
        </div>
      </div>
    </div>

    <div class="team-section">
      <div class="team-label b"><span class="dot"></span>Team B</div>
      <div class="input-group">
        <div class="input-row">
          <div class="input-icon">T</div>
          <input type="text" id="team-b-name" placeholder="Team name" autocomplete="off" spellcheck="false">
        </div>
        <div class="input-row">
          <div class="input-icon">P3</div>
          <input type="text" id="pb1" placeholder="Player 3" autocomplete="off">
        </div>
        <div class="input-row">
          <div class="input-icon">P4</div>
          <input type="text" id="pb2" placeholder="Player 4" autocomplete="off">
        </div>
      </div>
    </div>

    <button class="start-btn" onclick="startGame()">Start match →</button>

    <div class="share-section" id="share-section" style="display:none">
      <div class="share-label">Share this lineup</div>
      <div class="share-url" id="share-url"></div>
      <button class="copy-btn" onclick="copyLink()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        <span id="copy-label">Copy link</span>
      </button>
    </div>
  </div>
</div>

<!-- ════ GAME SCREEN ════ -->
<div class="screen" id="game">
  <div class="game-header">
    <div class="game-header-top">
      <div class="match-title" id="match-title">Match</div>
      <div class="scoreboard-pill">
        <span class="score-chip a" id="hdr-score-a">0</span>
        <span class="score-sep">–</span>
        <span class="score-chip b" id="hdr-score-b">0</span>
      </div>
    </div>
    <div class="round-tabs" id="round-tabs"></div>
  </div>

  <div id="round-panels"></div>

  <div class="nav-bar">
    <button class="nav-btn secondary" id="prev-btn" onclick="goRound(currentRound - 1)">←</button>
    <button class="nav-btn primary" id="next-btn" onclick="advanceRound()">Next round →</button>
  </div>
</div>

<!-- ════ FINAL SCREEN ════ -->
<div class="screen" id="final">
  <div class="final-header">
    <div class="winner-label" id="final-label">Final score</div>
    <div class="winner-name" id="final-winner"></div>
    <div class="final-score">
      <span class="fa" id="final-a">0</span>
      <span class="sep">–</span>
      <span class="fb" id="final-b">0</span>
    </div>
  </div>

  <div class="final-body">
    <div id="recap"></div>
    <button class="play-again-btn" onclick="playAgain()">Play again</button>
  </div>
</div>

<script>
const NUM_ROUNDS = 6;
let currentRound = 0;
let names = { an:'Team A', bn:'Team B', a1:'P1', a2:'P2', b1:'P3', b2:'P4' };

// shots[round][player] = [bool, bool, bool]
let shots = Array.from({length: NUM_ROUNDS}, () => ({
  a1:[false,false,false], a2:[false,false,false],
  b1:[false,false,false], b2:[false,false,false]
}));

/* ── URL params ── */
function readParams() {
  const p = new URLSearchParams(location.search);
  if (p.get('an')) { document.getElementById('team-a-name').value = p.get('an'); }
  if (p.get('bn')) { document.getElementById('team-b-name').value = p.get('bn'); }
  if (p.get('a1')) { document.getElementById('pa1').value = p.get('a1'); }
  if (p.get('a2')) { document.getElementById('pa2').value = p.get('a2'); }
  if (p.get('b1')) { document.getElementById('pb1').value = p.get('b1'); }
  if (p.get('b2')) { document.getElementById('pb2').value = p.get('b2'); }
  updateShareLink();
  // If names are all present, show share link
  if (p.get('a1') && p.get('b1')) {
    document.getElementById('share-section').style.display = 'block';
  }
}

function updateShareLink() {
  const an = document.getElementById('team-a-name').value;
  const bn = document.getElementById('team-b-name').value;
  const a1 = document.getElementById('pa1').value;
  const a2 = document.getElementById('pa2').value;
  const b1 = document.getElementById('pb1').value;
  const b2 = document.getElementById('pb2').value;
  if (!a1 && !b1) return;
  const url = new URL(location.href.split('?')[0]);
  if (an) url.searchParams.set('an', an);
  if (bn) url.searchParams.set('bn', bn);
  if (a1) url.searchParams.set('a1', a1);
  if (a2) url.searchParams.set('a2', a2);
  if (b1) url.searchParams.set('b1', b1);
  if (b2) url.searchParams.set('b2', b2);
  document.getElementById('share-url').textContent = url.toString();
  document.getElementById('share-section').style.display = 'block';
}

['team-a-name','team-b-name','pa1','pa2','pb1','pb2'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateShareLink);
});

function copyLink() {
  const url = document.getElementById('share-url').textContent;
  navigator.clipboard.writeText(url).then(() => {
    const lbl = document.getElementById('copy-label');
    lbl.textContent = 'Copied!';
    setTimeout(() => lbl.textContent = 'Copy link', 2000);
  });
}

/* ── scoring utils ── */
function playerScore(arr) {
  const h = arr.filter(Boolean).length;
  return h + (h === 3 ? 1 : 0);
}
function teamRoundScore(r, team) {
  if (team === 'a') return playerScore(r.a1) + playerScore(r.a2);
  return playerScore(r.b1) + playerScore(r.b2);
}
function totalScore(team) {
  return shots.reduce((s, r) => s + teamRoundScore(r, team), 0);
}
function initials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0,2) || '?';
}

/* ── START GAME ── */
function startGame() {
  names.an = document.getElementById('team-a-name').value || 'Team A';
  names.bn = document.getElementById('team-b-name').value || 'Team B';
  names.a1 = document.getElementById('pa1').value || 'Player 1';
  names.a2 = document.getElementById('pa2').value || 'Player 2';
  names.b1 = document.getElementById('pb1').value || 'Player 3';
  names.b2 = document.getElementById('pb2').value || 'Player 4';

  shots = Array.from({length: NUM_ROUNDS}, () => ({
    a1:[false,false,false], a2:[false,false,false],
    b1:[false,false,false], b2:[false,false,false]
  }));
  currentRound = 0;

  buildGameUI();
  showScreen('game');
}

/* ── BUILD GAME UI ── */
function buildGameUI() {
  document.getElementById('match-title').textContent = names.an + ' vs ' + names.bn;

  // tabs
  const tabs = document.getElementById('round-tabs');
  tabs.innerHTML = '';
  for (let i = 0; i < NUM_ROUNDS; i++) {
    const btn = document.createElement('button');
    btn.className = 'round-tab' + (i === 0 ? ' active' : '');
    btn.id = 'tab-' + i;
    btn.textContent = 'Round ' + (i + 1);
    btn.onclick = () => goRound(i);
    tabs.appendChild(btn);
  }

  // panels
  const panels = document.getElementById('round-panels');
  panels.innerHTML = '';
  for (let ri = 0; ri < NUM_ROUNDS; ri++) {
    const panel = document.createElement('div');
    panel.className = 'round-content' + (ri === 0 ? ' active' : '');
    panel.id = 'panel-' + ri;

    panel.innerHTML = `
      <div class="round-summary">
        <span class="summary-label">Round ${ri+1} score</span>
        <div class="summary-scores">
          <span class="a" id="rscore-a-${ri}" style="color:var(--a)">0</span>
          <span class="summary-sep">–</span>
          <span class="b" id="rscore-b-${ri}" style="color:var(--b)">0</span>
        </div>
      </div>
      <div class="team-block">
        <div class="team-block-header">
          <div class="team-block-name a">${names.an}</div>
          <div class="team-block-score a" id="tblock-a-${ri}">0</div>
        </div>
        ${playerCardHtml(ri, 'a1', names.a1, 'a')}
        ${playerCardHtml(ri, 'a2', names.a2, 'a')}
      </div>
      <div class="team-block">
        <div class="team-block-header">
          <div class="team-block-name b">${names.bn}</div>
          <div class="team-block-score b" id="tblock-b-${ri}">0</div>
        </div>
        ${playerCardHtml(ri, 'b1', names.b1, 'b')}
        ${playerCardHtml(ri, 'b2', names.b2, 'b')}
      </div>
    `;
    panels.appendChild(panel);
  }

  updateAllUI();
}

function playerCardHtml(ri, player, name, team) {
  return `
    <div class="player-card ${team}" id="pcard-${ri}-${player}">
      <div class="player-card-header">
        <div class="player-name-row">
          <div class="player-avatar ${team}">${initials(name)}</div>
          <div class="player-name">${name}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="bonus-tag ${team}" id="bonus-${ri}-${player}" style="display:none">Bonus</span>
          <span class="player-pts ${team}" id="pts-${ri}-${player}">0</span>
        </div>
      </div>
      <div class="shot-row">
        ${[0,1,2].map(i => `
          <button class="shot-btn ${team}" id="shot-${ri}-${player}-${i}" onclick="toggleShot(${ri},'${player}',${i})">
            Shot ${i+1}
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

/* ── TOGGLE SHOT ── */
function toggleShot(round, player, idx) {
  shots[round][player][idx] = !shots[round][player][idx];
  updateRoundUI(round);
  updateHeader();
}

function updateRoundUI(ri) {
  const r = shots[ri];
  const players = [
    { key:'a1', team:'a' }, { key:'a2', team:'a' },
    { key:'b1', team:'b' }, { key:'b2', team:'b' }
  ];

  players.forEach(({key, team}) => {
    const arr = r[key];
    const pts = playerScore(arr);
    const perfect = arr.every(Boolean);
    const card = document.getElementById(`pcard-${ri}-${key}`);

    arr.forEach((v, i) => {
      const btn = document.getElementById(`shot-${ri}-${key}-${i}`);
      btn.className = `shot-btn ${team}` + (v ? ' scored' : '');
      btn.textContent = v ? '✓' : 'Shot ' + (i + 1);
    });

    document.getElementById(`pts-${ri}-${key}`).textContent = pts;
    const bonusEl = document.getElementById(`bonus-${ri}-${key}`);
    bonusEl.style.display = perfect ? 'inline-block' : 'none';
    card.className = `player-card ${team}` + (perfect ? ' perfect' : '');
  });

  const sa = teamRoundScore(r, 'a');
  const sb = teamRoundScore(r, 'b');
  document.getElementById(`rscore-a-${ri}`).textContent = sa;
  document.getElementById(`rscore-b-${ri}`).textContent = sb;
  document.getElementById(`tblock-a-${ri}`).textContent = sa;
  document.getElementById(`tblock-b-${ri}`).textContent = sb;

  // mark tab as done if any shot scored
  const anyScored = [...r.a1,...r.a2,...r.b1,...r.b2].some(Boolean);
  const tab = document.getElementById('tab-' + ri);
  if (anyScored) tab.classList.add('done');
  else tab.classList.remove('done');
}

function updateHeader() {
  const ta = totalScore('a');
  const tb = totalScore('b');
  document.getElementById('hdr-score-a').textContent = ta;
  document.getElementById('hdr-score-b').textContent = tb;
}

function updateAllUI() {
  for (let i = 0; i < NUM_ROUNDS; i++) updateRoundUI(i);
  updateHeader();
  updateNavButtons();
}

/* ── NAVIGATION ── */
function goRound(idx) {
  if (idx < 0 || idx >= NUM_ROUNDS) return;
  document.querySelectorAll('.round-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.round-content').forEach((p, i) => p.classList.toggle('active', i === idx));
  // scroll tab into view
  document.getElementById('tab-' + idx).scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  currentRound = idx;
  updateNavButtons();
}

function advanceRound() {
  if (currentRound < NUM_ROUNDS - 1) {
    goRound(currentRound + 1);
  } else {
    showFinal();
  }
}

function updateNavButtons() {
  const prev = document.getElementById('prev-btn');
  const next = document.getElementById('next-btn');
  prev.style.display = currentRound === 0 ? 'none' : 'block';
  next.textContent = currentRound === NUM_ROUNDS - 1 ? 'View results →' : 'Next round →';
}

/* ── FINAL ── */
function showFinal() {
  const ta = totalScore('a');
  const tb = totalScore('b');
  document.getElementById('final-a').textContent = ta;
  document.getElementById('final-b').textContent = tb;

  const winnerEl = document.getElementById('final-winner');
  const labelEl = document.getElementById('final-label');
  if (ta > tb) {
    winnerEl.textContent = names.an + ' wins!';
    winnerEl.className = 'winner-name a';
    labelEl.textContent = 'Winner';
  } else if (tb > ta) {
    winnerEl.textContent = names.bn + ' wins!';
    winnerEl.className = 'winner-name b';
    labelEl.textContent = 'Winner';
  } else {
    winnerEl.textContent = "It's a tie!";
    winnerEl.className = 'winner-name tie';
    labelEl.textContent = 'Final score';
  }

  // recap
  const recap = document.getElementById('recap');
  recap.innerHTML = '';
  for (let ri = 0; ri < NUM_ROUNDS; ri++) {
    const r = shots[ri];
    const sa = teamRoundScore(r, 'a');
    const sb = teamRoundScore(r, 'b');

    const block = document.createElement('div');
    block.className = 'round-recap';
    block.innerHTML = `
      <div class="round-recap-header">Round ${ri+1} &nbsp;·&nbsp; <span style="color:var(--a)">${sa}</span> – <span style="color:var(--b)">${sb}</span></div>
      <div class="recap-card">
        ${recapRow(names.a1, r.a1, 'a')}
        ${recapRow(names.a2, r.a2, 'a')}
        ${recapRow(names.b1, r.b1, 'b')}
        ${recapRow(names.b2, r.b2, 'b')}
      </div>
    `;
    recap.appendChild(block);
  }

  showScreen('final');
}

function recapRow(name, arr, team) {
  const pts = playerScore(arr);
  return `
    <div class="recap-row">
      <span class="recap-player">${name}</span>
      <div class="recap-shots">
        ${arr.map(v => `<div class="recap-dot${v ? ' scored ' + team : ''}"></div>`).join('')}
      </div>
      <span class="recap-pts ${team}">${pts}</span>
    </div>
  `;
}

function playAgain() {
  showScreen('setup');
}

/* ── SCREEN SWITCHING ── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

/* ── INIT ── */
readParams();
showScreen('setup');
</script>
</body>
</html>
